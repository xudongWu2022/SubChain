services:
  postgres:
    image: postgres:16-alpine
    container_name: subchain-postgres
    environment:
      POSTGRES_DB: subchain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - subchain-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subchain"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  subchain-postgres-data:
