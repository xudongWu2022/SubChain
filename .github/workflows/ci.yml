name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (all workspaces)
        run: pnpm -r run typecheck
      - name: Agent money-path unit tests
        run: pnpm --filter @subchain/agent run test
      - name: Vendor ds-test for Foundry (lib/ is gitignored)
        run: git clone --depth 1 https://github.com/dapphub/ds-test contracts/lib/ds-test
      - name: Unified gate (preflight, protocol canary, docs gate, forge tests)
        run: node scripts/test-all.mjs
      - name: Build contracts with build-info (for Slither)
        working-directory: contracts
        run: forge build --build-info
      - name: Slither static analysis (contracts)
        uses: crytic/slither-action@v0.4.2
        with:
          target: contracts
          slither-args: --exclude-dependencies
          fail-on: none
          ignore-compile: true
